<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์ปรึกษาแพทย์และผู้เชี่ยวชาญ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .chat-bg { background-color: #f0f7ff; }
        .user-bubble { background-color: #3b82f6; color: #ffffff; }
        .doctor-bubble { background-color: #ffffff; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white p-4 flex items-center justify-between shadow-xs shrink-0">
        <div>
            <h1 class="text-lg font-bold leading-tight" id="welcomeUser">ศูนย์ปรึกษาผู้เชี่ยวชาญ</h1>
            <p class="text-xs text-blue-200 flex items-center">● เจ้าหน้าที่กำลังออนไลน์</p>
        </div>
        <div class="text-xs bg-blue-700 px-3 py-1.5 rounded-full border border-blue-500 font-medium">
            Medical Chat
        </div>
    </header>

    <div id="clinicSection" class="bg-amber-50 border-b border-amber-200 p-3 shrink-0 hidden max-h-40 overflow-y-auto">
        <div class="max-w-2xl mx-auto">
            <h3 class="text-xs font-bold text-amber-800 mb-1">🏥 แนะนำสถานพยาบาลใกล้คุณที่เข้าร่วมโครงการ:</h3>
            <div id="clinicList" class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs"></div>
        </div>
    </div>

    <main class="chat-bg flex-1 overflow-y-auto p-4 space-y-4" id="chatContainer">
        <div id="chatHistory" class="space-y-4 max-w-2xl mx-auto">
            <p class="text-slate-400 text-center py-4 text-sm">กำลังเชื่อมต่อห้องแชท...</p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 p-3 shrink-0 shadow-md">
        <form id="expertChatForm" class="max-w-2xl mx-auto flex items-end space-x-2">
            <textarea id="chatMessage" rows="1" required placeholder="พิมพ์ข้อความปรึกษาแพทย์ที่นี่..." 
                      class="flex-1 min-h-[40px] max-h-[120px] p-2 bg-slate-50 border border-slate-200 rounded-xl resize-none focus:outline-hidden focus:border-blue-500 text-sm"
                      oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-xs transition shrink-0 h-[40px] flex items-center justify-center cursor-pointer">
                ส่ง
            </button>
        </form>
    </footer>

    <script>
        const SUPABASE_URL = "https://gsfwxrbeykupnobvnvvj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_qpHFtNjXGKYTIXMXaT_NPw_BLIOv7oc";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const savedName = localStorage.getItem('patient_chat_name');
        const savedResult = localStorage.getItem('patient_test_result');

        if (!savedName) {
            alert("กรุณากรอกข้อมูลผู้ป่วยก่อนเข้าห้องแชทครับ");
            window.location.href = "index.html";
        } else {
            document.getElementById('welcomeUser').innerText = `คุณ ${savedName}`;
            if(savedResult === 'positive') {
                loadClinics();
            }
            loadChatHistory();
        }

        async function loadChatHistory() {
            const { data: chats, error } = await db
                .from('expert_chats')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) { console.error(error); return; }

            const chatHistoryDiv = document.getElementById('chatHistory');
            chatHistoryDiv.innerHTML = '';

            if (!chats || chats.length === 0) {
                chatHistoryDiv.innerHTML = `<p class="text-slate-400 text-center py-8 text-sm bg-white/60 rounded-xl border border-dashed border-slate-200">ยินดีต้อนรับคุณ ${savedName} เริ่มต้นพิมพ์คุยกับแพทย์ได้เลยครับ</p>`;
                return;
            }

            chats.forEach(chat => {
                const chatTime = new Date(chat.created_at).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                let chatHtml = `
                    <div class="flex flex-col items-end w-full space-y-1">
                        <span class="text-[11px] text-slate-500 mr-1">${chat.patient_name}</span>
                        <div class="flex items-end space-x-1.5 max-w-[80%]">
                            <span class="text-[10px] text-slate-400 shrink-0 select-none">${chatTime}</span>
                            <div class="user-bubble p-2.5 rounded-2xl rounded-tr-xs shadow-xs text-sm break-words">
                                ${chat.chat_message}
                            </div>
                        </div>
                    </div>
                `;

                if (chat.expert_reply) {
                    chatHtml += `
                        <div class="flex flex-col items-start w-full space-y-1 mt-2">
                            <span class="text-[11px] text-blue-600 font-semibold ml-1">👨‍⚕️ ผู้เชี่ยวชาญ</span>
                            <div class="flex items-end space-x-1.5 max-w-[80%]">
                                <div class="doctor-bubble border border-blue-100 p-2.5 rounded-2xl rounded-tl-xs shadow-xs text-sm break-words">
                                    ${chat.expert_reply}
                                </div>
                                <span class="text-[10px] text-slate-400 shrink-0 select-none">${chatTime}</span>
                            </div>
                        </div>
                    `;
                } else {
                    chatHtml = chatHtml.replace('shrink-0 select-none">', 'shrink-0 select-none text-right text-[10px] text-slate-400">ส่งแล้ว<br>');
                }

                chatHistoryDiv.innerHTML += chatHtml;
            });

            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function loadClinics() {
            const { data: clinics, error } = await db.from('clinics').select('*');
            if (error || !clinics) return;
            const clinicListDiv = document.getElementById('clinicList');
            clinicListDiv.innerHTML = '';
            clinics.forEach(clinic => {
                // 🌟 แก้ไขจุดที่สแลชเกินเรียบร้อยแล้วครับ
                clinicListDiv.innerHTML += `
                    <div class="p-2 border border-amber-200 rounded-lg bg-white space-y-0.5">
                        <h4 class="font-bold text-slate-800">${clinic.name}</h4>
                        <p class="text-[11px] text-slate-600">📍 ${clinic.location}</p>
                        ${clinic.google_maps_url ? `<a href="${clinic.google_maps_url}" target="_blank" class="text-[10px] text-blue-600 font-medium hover:underline">แผนที่ →</a>` : ''}
                    </div>`;
            });
            document.getElementById('clinicSection').classList.remove('hidden');
        }

        document.getElementById('expertChatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const chatMessageInput = document.getElementById('chatMessage');
            const chatMessage = chatMessageInput.value;

            const { error } = await db
                .from('expert_chats')
                .insert([{ patient_name: savedName, chat_message: chatMessage }]);

            if (error) {
                alert('ส่งข้อความไม่สำเร็จ: ' + error.message);
            } else {
                chatMessageInput.value = '';
                chatMessageInput.style.height = '40px'; 
                await loadChatHistory();
            }
        });

        setInterval(loadChatHistory, 3000);
    </script>
</body>
</html>
